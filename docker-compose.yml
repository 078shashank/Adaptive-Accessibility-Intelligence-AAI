version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aai-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./aai.db
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:8000","http://127.0.0.1:3000","http://127.0.0.1:8000"]
      - APP_NAME=AAI - Adaptive Accessibility Intelligence
      - HF_MODEL_NAME=facebook/bart-large-cnn
      - DEBUG=False
    volumes:
      - ./backend:/app
      - ./backend/aai.db:/app/aai.db:rw
    command: >
      sh -c "python -m uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - aai-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aai-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_BASE_URL=http://localhost:8000
      - NODE_ENV=production
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - aai-network

networks:
  aai-network:
    driver: bridge
